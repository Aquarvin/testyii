version: '3.8'

services:

  web:
    build:
      context: ./docker/web
      dockerfile: Dockerfile
    container_name: yii_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - yii_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      YII_PATH: /var/www/yii
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: yii_db
      DB_USER: yii_user
      DB_PASSWORD: yii_password

  db:
    image: mysql:5.7
    container_name: yii_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: yii_db
      MYSQL_USER: yii_user
      MYSQL_PASSWORD: yii_password
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - yii_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uyii_user", "-pyii_password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  yii_network:
    driver: bridge

volumes:
  db_data:
    driver: local
